<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OrçaZap — Calculadora de Orçamento</title>
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D2C45;
    --navy-700: #123A5C;
    --blue: #1565C0;
    --bg: #F4F7FA;
    --white: #FFFFFF;
    --green: #1FAA59;
    --green-dark: #178A48;
    --text: #16232E;
    --text-muted: #64748B;
    --border: #DFE6EC;
    --radius-lg: 18px;
    --radius-md: 14px;
    --shadow-card: 0 10px 30px rgba(13,44,69,0.08);
    --shadow-btn: 0 8px 18px rgba(31,170,89,0.28);
  }
  *{ box-sizing: border-box; }
  body { margin:0; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); display:flex; justify-content:center; }
  .page { width:100%; max-width: 440px; padding: 24px 20px; display:flex; flex-direction:column; gap: 16px; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; }
  .header h2 { color: var(--navy); margin:0; font-size: 22px; font-weight: 800; }
  .btn-logout { background:none; border:none; color: var(--text-muted); font-weight:600; cursor:pointer; font-size: 14px; }
  .card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); border: 1px solid var(--border); padding: 20px; display:flex; flex-direction:column; gap: 16px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size: 13px; font-weight: 700; color: var(--navy); }
  input, select { width:100%; font-size:16px; font-weight:500; color: var(--text); background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; outline:none; }
  input:focus, select:focus { border-color: var(--blue); background: var(--white); }
  .row { display:flex; gap: 12px; }
  .row .field { flex:1; }
  
  /* Bloco dinâmico de medidas */
  #bloco-area { display: flex; gap: 12px; }
  #bloco-quantidade { display: none; }

  .total-box { background: var(--navy); color: white; border-radius: var(--radius-md); padding: 20px; text-align:center; margin-top: 10px; }
  .total-box span { display:block; font-size: 13px; opacity: 0.8; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.05em; }
  .total-box h3 { margin:0; font-size: 28px; font-weight: 800; }
  .btn-primary { width:100%; border:none; border-radius: var(--radius-md); padding: 18px; font-size:16px; font-weight:700; color:#fff; background: linear-gradient(180deg, var(--green) 0%, var(--green-dark) 100%); box-shadow: var(--shadow-btn); cursor:pointer; margin-top: 10px; }
  footer { text-align:center; margin-top:10px; font-size:12px; color: var(--text-muted); font-weight:500; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h2>OrçaZap 📏</h2>
    <div style="display: flex; gap: 12px;">
      <button class="btn-logout" onclick="window.location.href='historico.html'">Histórico</button>
      <button class="btn-logout" onclick="window.location.href='index.html'">Sair</button>
    </div>
  </div>
    <h2>OrçaZap 📏</h2>
    <button class="btn-logout" onclick="window.location.href='index.html'">Sair</button>
  </div>

  <div class="card">
    <div class="field">
      <label for="cliente">Nome do Cliente</label>
      <input type="text" id="cliente" placeholder="Ex: Esposa do Gerente">
    </div>

    <div class="field">
      <label for="material">Material / Insumo</label>
      <select id="material" onchange="ajustarCamposEDecoracoes()">
        <!-- Marmoraria -->
        <option value="900" data-tipo="m2">Mármore São Gabriel - R$ 900/m²</option>
        <option value="1200" data-tipo="m2">Mármore Carrara - R$ 1.200/m²</option>
        <!-- Serralheria -->
        <option value="85" data-tipo="metro">Ferro Tubular 40x40 - R$ 85/metro</option>
        <!-- Outros -->
        <option value="45" data-tipo="unidade">Saco de Cimento - R$ 45/unid.</option>
        <option value="6.50" data-tipo="metro">Fio Flexível 2.5mm - R$ 6,50/metro</option>
      </select>
    </div>

    <!-- Se for por m² (Mármore), o JavaScript mantém este bloco aberto -->
    <div id="bloco-area">
      <div class="field">
        <label for="largura">Largura (metros)</label>
        <input type="number" id="largura" value="0.60" step="0.01" oninput="calcularTudo()">
      </div>
      <div class="field">
        <label for="comprimento">Comprimento (m)</label>
        <input type="number" id="comprimento" value="1.50" step="0.01" oninput="calcularTudo()">
      </div>
    </div>

    <!-- Se for por metro linear ou unidade, o JavaScript abre este bloco -->
    <div id="bloco-quantidade" class="field">
      <label id="label-quantidade" for="quantidade">Quantidade / Medida</label>
      <input type="number" id="quantidade" value="1" step="0.01" oninput="calcularTudo()">
    </div>

    <div class="field">
      <label for="mao_obra">Mão de Obra e Instalação (R$)</label>
      <input type="number" id="mao_obra" value="300" oninput="calcularTudo()">
    </div>

    <div class="total-box">
      <span>VALOR DO ORÇAMENTO</span>
      <h3 id="valor-total">R$ 1.110,00</h3>
    </div>

    <button class="btn-primary" onclick="compartilharWhatsApp()">Gerar e Enviar por WhatsApp</button>
  </div>
  
  <footer>OrçaZap &copy; 2026 — Desenvolvido por Cido Wagner</footer>
</div>

<script>
  // Altera os campos dinamicamente conforme o tipo de unidade do material escolhido
  function ajustarCamposEDecoracoes() {
    const select = document.getElementById('material');
    const tipo = select.options[select.selectedIndex].getAttribute('data-tipo');
    
    const blocoArea = document.getElementById('bloco-area');
    const blocoQuantidade = document.getElementById('bloco-quantidade');
    const labelQuantidade = document.getElementById('label-quantidade');

    if (tipo === 'm2') {
      blocoArea.style.display = 'flex';
      blocoQuantidade.style.display = 'none';
    } else {
      blocoArea.style.display = 'none';
      blocoQuantidade.style.display = 'flex';
      labelQuantidade.innerText = tipo === 'metro' ? 'Comprimento Total (metros)' : 'Quantidade (unidades)';
    }
    calcularTudo();
  }

  // O motor matemático do aplicativo
  function calcularTudo() {
    const select = document.getElementById('material');
    const precoUnitario = parseFloat(select.value) || 0;
    const tipo = select.options[select.selectedIndex].getAttribute('data-tipo');
    const maoObra = parseFloat(document.getElementById('mao_obra').value) || 0;

    let custoMaterial = 0;

    if (tipo === 'm2') {
      const largura = parseFloat(document.getElementById('largura').value) || 0;
      const comprimento = parseFloat(document.getElementById('comprimento').value) || 0;
      const area = largura * comprimento;
      custoMaterial = area * precoUnitario;
    } else {
      const quantidade = parseFloat(document.getElementById('quantidade').value) || 0;
      custoMaterial = quantidade * precoUnitario;
    }

    const total = custoMaterial + maoObra;
    document.getElementById('valor-total').innerText = 'R$ ' + total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // Gera a mensagem limpa e profissional e compartilha pelo WhatsApp
  function compartilharWhatsApp() {
    const cliente = document.getElementById('cliente').value.trim() || 'Cliente';
    const totalText = document.getElementById('valor-total').innerText;
    
    const select = document.getElementById('material');
    const textoMaterial = select.options[select.selectedIndex].text.split(' - ')[0];
    const tipo = select.options[select.selectedIndex].getAttribute('data-tipo');

    let detalheMedida = '';
    if (tipo === 'm2') {
      const largura = document.getElementById('largura').value;
      const comprimento = document.getElementById('comprimento').value;
      detalheMedida = `📐 *Medidas:* ${largura}m × ${comprimento}m`;
    } else {
      const qtd = document.getElementById('quantidade').value;
      detalheMedida = `🔢 *Quantidade/Medida:* ${qtd} ${tipo === 'metro' ? 'metros' : 'unidades'}`;
    }

    const textoMensagem = `Olá *${cliente}*, segue o orçamento profissional solicitado:\n\n` +
                          `🔹 *Material:* ${textoMaterial}\n` +
                          `${detalheMedida}\n` +
                          `💰 *Valor Total do Serviço:* ${totalText}\n\n` +
                          `_Gerado instantaneamente via OrçaZap!_`;
// === INÍCIO DO CÓDIGO PARA SALVAR NO HISTÓRICO ===
    const orcamento = {
      data: new Date().toLocaleDateString('pt-BR') + ' às ' + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
      cliente: cliente,
      material: textoMaterial,
      medida: detalheMedida.replace(/[^a-zA-Z0-9\s:.,×]/g, '').trim(), // Remove os emojis para o histórico ficar mais limpo
      total: totalText
    };

    let historico = JSON.parse(localStorage.getItem('orcazap_historico')) || [];
    historico.push(orcamento); // Adiciona o novo orçamento
    localStorage.setItem('orcazap_historico', JSON.stringify(historico)); // Salva no navegador
    // === FIM DO CÓDIGO DO HISTÓRICO ===
   window.open("https://wa.me/?text=" + encodeURIComponent(textoMensagem), "_blank");
  }
</script>
</body>
</html>
