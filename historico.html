<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OrçaZap — Histórico</title>
<link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D2C45;
    --navy-700: #123A5C;
    --bg: #F4F7FA;
    --white: #FFFFFF;
    --text: #16232E;
    --text-muted: #64748B;
    --border: #DFE6EC;
    --radius-lg: 18px;
    --radius-md: 14px;
    --shadow-card: 0 10px 30px rgba(13,44,69,0.08);
  }
  *{ box-sizing: border-box; }
  body { margin:0; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); display:flex; justify-content:center; }
  .page { width:100%; max-width: 440px; padding: 24px 20px; display:flex; flex-direction:column; gap: 16px; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; }
  .header h2 { color: var(--navy); margin:0; font-size: 22px; font-weight: 800; }
  .btn-voltar { background:none; border:none; color: var(--text-muted); font-weight:600; cursor:pointer; font-size: 14px; }
  .card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); border: 1px solid var(--border); padding: 20px; }
  
  .historico-item { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
  .historico-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .data { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .cliente { font-size: 15px; font-weight: 700; color: var(--navy); }
  .detalhes { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
  .valor { font-size: 15px; font-weight: 800; color: #178A48; margin-top: 6px; }
  .vazio { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }
  
  .btn-limpar { width:100%; background:none; border:none; color: #D32F2F; font-weight:600; cursor:pointer; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h2>Histórico 🗂️</h2>
    <button class="btn-voltar" onclick="window.location.href='calculadora.html'">Voltar</button>
  </div>

  <div class="card" id="lista-historico">
    <!-- O JavaScript vai injetar os orçamentos salvos aqui dentro -->
  </div>

  <button class="btn-limpar" onclick="limparHistorico()">Limpar Histórico</button>
</div>

<script>
  function carregarHistorico() {
    const lista = document.getElementById('lista-historico');
    const historico = JSON.parse(localStorage.getItem('orcazap_historico')) || [];

    if (historico.length === 0) {
      lista.innerHTML = '<div class="vazio">Nenhum orçamento salvo ainda.</div>';
      return;
    }

    // O reverse() faz o orçamento mais recente aparecer no topo da lista
    lista.innerHTML = historico.reverse().map(item => `
      <div class="historico-item">
        <div class="data">${item.data}</div>
        <div class="cliente">👤 ${item.cliente || 'Cliente'}</div>
        <div class="detalhes">
          ${item.material}<br>
          ${item.medida}
        </div>
        <div class="valor">${item.total}</div>
      </div>
    `).join('');
  }

  function limparHistorico() {
    if(confirm("Tem certeza que deseja apagar todos os orçamentos salvos?")) {
      localStorage.removeItem('orcazap_historico');
      carregarHistorico();
    }
  }

  // Carrega a lista automaticamente assim que a página abre
  window.onload = carregarHistorico;
</script>
</body>
</html>
