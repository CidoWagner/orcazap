<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OrçaZap — Histórico</title>
<link href="https://googleapis.com" rel="stylesheet">
<!-- Biblioteca Estável do Supabase -->
<script src="https://cloudflare.com"></script>
<style>
  :root {
    --navy: #0D2C45;
    --bg: #F4F7FA;
    --white: #FFFFFF;
    --text: #16232E;
    --text-muted: #64748B;
    --border: #DFE6EC;
    --radius-md: 14px;
  }
  *{ box-sizing: border-box; }
  body { margin:0; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); display:flex; justify-content:center; }
  .page { width:100%; max-width: 440px; padding: 24px 20px; display:flex; flex-direction:column; gap: 16px; }
  .header { display:flex; justify-content:space-between; align-items:center; }
  .header h2 { color: var(--navy); margin:0; font-size: 22px; font-weight: 800; }
  .btn-back { background:none; border:none; color: var(--text-muted); font-weight:600; cursor:pointer; font-size: 14px; }
  .lista-orcamentos { display: flex; flex-direction: column; gap: 12px; }
  .item-orcamento { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px rgba(13,44,69,0.03); }
  .info-cliente h4 { margin: 0 0 4px 0; font-size: 16px; color: var(--navy); font-weight: 700; }
  .info-cliente p { margin: 0; font-size: 13px; color: var(--text-muted); }
  .valor-orcamento { font-size: 16px; font-weight: 800; color: #1FAA59; }
  .loading { text-align: center; color: var(--text-muted); margin-top: 20px; font-weight: 500; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h2>Histórico 📂</h2>
    <button class="btn-back" onclick="window.location.href='calculadora.html'">Voltar</button>
  </div>

  <div id="loading" class="loading">Carregando orçamentos antigos...</div>
  <div class="lista-orcamentos" id="lista"></div>
</div>

<script>
  const SUPABASE_URL = "https://supabase.co";
  const SUPABASE_KEY = "sb_publishable_bUCzdW_A7zsMW5Ubh3zEJw_1cZuJ5bG";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function carregarHistorico() {
    // Busca os orçamentos salvos na nuvem ordenados pelo mais recente
    const { data, error } = await supabaseClient
      .from('orcamentos')
      .select('*')
      .order('created_at', { ascending: false });

    document.getElementById('loading').style.display = 'none';

    if (error) {
      alert('Erro ao carregar histórico: ' + error.message);
      return;
    }

    const listaContainer = document.getElementById('lista');
    listaContainer.innerHTML = '';

    if (data.length === 0) {
      listaContainer.innerHTML = '<p class="loading">Nenhum orçamento salvo ainda.</p>';
      return;
    }

    // Renderiza cada orçamento salvo na tela com o estilo do Agenda Boa
    data.forEach(orcamento => {
      const dataFormatada = new Date(orcamento.created_at).toLocaleDateString('pt-BR');
      const itemHTML = `
        <div class="item-orcamento">
          <div class="info-cliente">
            <h4>${orcamento.cliente}</h4>
            <p>${orcamento.material} • ${dataFormatada}</p>
          </div>
          <div class="valor-orcamento">
            R$ ${orcamento.total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
          </div>
        </div>
      `;
      listaContainer.innerHTML += itemHTML;
    });
  }

  // Executa a busca assim que a página abre
  carregarHistorico();
</script>
</body>
</html>
